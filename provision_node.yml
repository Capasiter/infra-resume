---
- name: Infrastructure Baseline - Ubuntu/Debian Node Provisioning
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Ensure system repositories are fully updated
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Install foundational system dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
        state: present

    - name: Create directory for Docker APT keyring
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Fetch Docker official GPG signing key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Set up the official Docker stable repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker Engine and Container Runtime
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker daemon service is enabled and actively running
      systemd:
        name: docker
        state: started
        enabled: yes
